spring.datasource.url=jdbc:h2:mem:softlovely;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Use H2 dialect in dev to avoid creating MySQL-specific DDL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# dev profile
app.base-url=http://localhost:8080

# Stripe test keys can remain in application.properties; in dev you can override if needed
