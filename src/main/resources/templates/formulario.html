<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário do Amor ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo para deixar o texto do input de data cinza quando vazio */
        input[type="date"]:in-range::-webkit-datetime-edit-year-field,
        input[type="date"]:in-range::-webkit-datetime-edit-month-field,
        input[type="date"]:in-range::-webkit-datetime-edit-day-field {
            color: #9ca3af; /* Cor do texto do placeholder */
        }
        input[type="date"] {
            color: white; /* Cor do texto quando uma data é selecionada */
        }
        input::-webkit-calendar-picker-indicator {
            display: none;
        }
    </style>
</head>
<body class="bg-[#121212] text-white font-sans">

<div class="flex flex-col min-h-screen p-6">
    <header class="w-full bg-[#121212]">
        <div class="flex justify-between items-center mb-10 max-w-6xl mx-auto px-6">
            <div class="bg-gradient-to-br from-pink-500 to-purple-600 w-14 h-14 flex items-center justify-center rounded-full text-white font-bold text-sm hover:scale-110 active:scale-95 transition-transform duration-300">
                &lt;>SoftLovely
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white hover:rotate-90 transition-transform duration-500 ease-in-out cursor-pointer" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </div>
    </header>

    <main class="w-full max-w-md md:max-w-2xl lg:max-w-4xl mx-auto flex-grow">
        <h1 class="text-3xl md:text-5xl font-bold text-center mb-4">
            Presenteie seu acompanhante com uma surpresa incrível
        </h1>
        <p class="text-center text-gray-400 mb-8 text-sm md:text-base">
            Preencha os dados
        </p>

        <form th:action="@{/formularios/salvar}" th:object="${formularioModel}"
              method="post" enctype="multipart/form-data"
              class="space-y-5 bg-[#1c1c1c] p-6 md:p-10 rounded-2xl shadow-lg">
            <input type="text" th:field="*{nomeAcompanhante}" placeholder="Nome do parceiro"
                   class="w-full p-4 rounded-full border border-purple-600 bg-transparent text-white
          focus:outline-none focus:border-pink-500 placeholder-gray-400
          transition duration-300 ease-in-out transform hover:scale-105 active:scale-95 hover:shadow-lg" />

            <input type="date" th:field="*{dataDeInicio}" required
                   class="w-full p-4 rounded-full border border-purple-600 bg-transparent
          focus:outline-none focus:border-pink-500
          transition duration-300 ease-in-out transform hover:scale-105 active:scale-95 hover:shadow-lg" />

            <input type="text" th:field="*{musica}" placeholder="Escolha uma música"
                   class="w-full p-4 rounded-full border border-purple-600 bg-transparent text-white
          focus:outline-none focus:border-pink-500 placeholder-gray-400
          transition duration-300 ease-in-out transform hover:scale-105 active:scale-95 hover:shadow-lg" />

            <div>
                <label for="imagem"
                       class="cursor-pointer w-full flex items-center p-4 rounded-full border border-purple-600
                          bg-transparent text-gray-400 hover:border-pink-500 transition duration-300 hover:scale-105 active:scale-95">
                    Selecione as fotos
                </label>
                <input type="file" name="imagem" id="imagem" accept="image/*" class="hidden" />
            </div>

            <button type="submit"
                    class="w-full bg-gradient-to-r from-pink-500 to-purple-600 hover:opacity-90 text-white
                       font-semibold py-4 rounded-full transition-all text-lg
                       transform hover:scale-105 active:scale-95 duration-300 ease-out shadow-md hover:shadow-xl">
                Finalizar surpresa →
            </button>
        </form>
    </main>
</div>

</body>
</html>
